events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name SEU_DOMINIO_AQUI;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - N8N (dominio principal)
    server {
        listen 443 ssl;
        server_name SEU_DOMINIO_AQUI;

        ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO_AQUI/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO_AQUI/privkey.pem;

        # N8N
        location / {
            proxy_pass http://n8n:5678;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }

    # HTTPS - Dashboard (subdominio)
    server {
        listen 443 ssl;
        server_name painel.SEU_DOMINIO_AQUI;

        ssl_certificate /etc/letsencrypt/live/SEU_DOMINIO_AQUI/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO_AQUI/privkey.pem;

        location / {
            proxy_pass http://dashboard:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api burst=20 nodelay;
        }
    }
}
